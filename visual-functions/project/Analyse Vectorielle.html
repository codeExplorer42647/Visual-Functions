<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Analyse Vectorielle — Atelier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400;1,6..72,500&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0c;
    --bg-2: #141310;
    --panel: #1a1916;
    --panel-2: #221f1a;
    --ink: #ebe4d1;
    --ink-soft: #cfc9b7;
    --muted: #8a8576;
    --muted-2: #5a564c;
    --line: #2a2824;
    --line-soft: #1f1d1a;
    --hot: oklch(0.78 0.14 80);     /* warm yellow */
    --coral: oklch(0.72 0.14 25);   /* coral */
    --teal: oklch(0.74 0.12 200);   /* teal */
    --violet: oklch(0.72 0.14 300);
    --ok: oklch(0.74 0.12 150);
    --font-ui: 'Geist', ui-sans-serif, system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
    --font-math: 'Newsreader', 'Iowan Old Style', Georgia, serif;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-ui);
    font-feature-settings: "ss01", "cv11";
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  /* thin scrollbars */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted-2); }

  .app {
    display: grid;
    grid-template-columns: 220px 1fr 360px;
    grid-template-rows: 48px 1fr;
    height: 100vh;
  }
  .topbar {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    border-bottom: 1px solid var(--line);
    background: var(--bg);
    user-select: none;
  }
  .topbar .brand {
    display: flex; align-items: baseline; gap: 10px;
    font-family: var(--font-math);
    font-style: italic;
    font-size: 16px;
    letter-spacing: 0.01em;
    white-space: nowrap;
  }
  .topbar .brand small {
    font-family: var(--font-mono);
    font-style: normal;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .topbar .meta {
    display: flex; gap: 18px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
  }
  .topbar .meta kbd {
    font-family: var(--font-mono);
    font-size: 10px;
    background: var(--panel);
    border: 1px solid var(--line);
    padding: 1px 5px;
    border-radius: 3px;
    color: var(--ink-soft);
  }

  .rail {
    border-right: 1px solid var(--line);
    background: var(--bg-2);
    padding: 14px 0;
    overflow-y: auto;
  }
  .rail .group-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted-2);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 14px 18px 6px;
  }
  .rail .mod {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 18px;
    cursor: pointer;
    color: var(--ink-soft);
    font-size: 13px;
    border-left: 2px solid transparent;
    transition: background 80ms ease;
  }
  .rail .mod:hover { background: #1c1b17; color: var(--ink); }
  .rail .mod.active {
    background: #1e1c17;
    color: var(--hot);
    border-left-color: var(--hot);
  }
  .rail .mod .num {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    width: 18px;
  }
  .rail .mod.active .num { color: var(--hot); }

  .canvas-wrap {
    position: relative;
    overflow: hidden;
    background:
      radial-gradient(ellipse at 30% 20%, #1a1815 0%, var(--bg) 55%);
  }
  .canvas-wrap canvas { display: block; width: 100%; height: 100%; }

  .inspector {
    border-left: 1px solid var(--line);
    background: var(--bg-2);
    overflow-y: auto;
    padding: 18px 20px 40px;
  }
  .inspector h3 {
    font-family: var(--font-math);
    font-style: italic;
    font-weight: 500;
    font-size: 20px;
    margin: 0 0 2px;
    letter-spacing: 0.01em;
  }
  .inspector .subtitle {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 18px;
  }
  .inspector section { margin-bottom: 22px; }
  .inspector .section-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .inspector .intuition {
    font-family: var(--font-math);
    font-size: 14px;
    line-height: 1.5;
    color: var(--ink-soft);
    border-left: 1px solid var(--line);
    padding: 2px 0 2px 12px;
    font-style: italic;
  }
  .inspector .intuition em { color: var(--hot); font-style: italic; }

  .input-row {
    display: flex; align-items: center; gap: 8px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 8px 10px;
    font-family: var(--font-mono);
    font-size: 13px;
  }
  .input-row .eq {
    color: var(--muted);
    font-family: var(--font-math);
    font-style: italic;
    font-size: 14px;
    white-space: nowrap;
  }
  .input-row input {
    flex: 1;
    background: transparent;
    color: var(--ink);
    border: 0;
    outline: 0;
    font-family: var(--font-mono);
    font-size: 13px;
  }
  .input-row.error { border-color: var(--coral); }

  .examples {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-top: 8px;
  }
  .chip {
    font-family: var(--font-mono);
    font-size: 11.5px;
    background: var(--panel);
    border: 1px solid var(--line);
    color: var(--ink-soft);
    padding: 4px 9px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 80ms ease;
  }
  .chip:hover { border-color: var(--hot); color: var(--hot); }

  .slider-row {
    display: grid;
    grid-template-columns: 1fr 60px;
    align-items: center;
    gap: 10px;
    padding: 6px 0;
  }
  .slider-row .slabel {
    font-family: var(--font-math);
    font-style: italic;
    font-size: 14px;
    color: var(--ink-soft);
  }
  .slider-row .svalue {
    font-family: var(--font-mono);
    font-size: 11.5px;
    color: var(--hot);
    text-align: right;
  }
  .slider-row .track {
    grid-column: 1 / -1;
  }
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 2px;
    background: var(--line);
    border-radius: 1px;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--hot);
    cursor: pointer;
    border: 2px solid var(--bg);
  }
  input[type="range"]::-moz-range-thumb {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--hot);
    cursor: pointer;
    border: 2px solid var(--bg);
  }

  .kv {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 6px 12px;
    font-size: 13px;
    font-family: var(--font-mono);
  }
  .kv .k {
    color: var(--muted);
    font-family: var(--font-math);
    font-style: italic;
    font-size: 14px;
  }
  .kv .v { color: var(--ink); text-align: right; }
  .kv .v.hot { color: var(--hot); }
  .kv .v.coral { color: var(--coral); }
  .kv .v.teal { color: var(--teal); }

  .toggle-group {
    display: flex;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 5px;
    padding: 2px;
    gap: 2px;
  }
  .toggle-group button {
    flex: 1;
    font-family: var(--font-mono);
    font-size: 11px;
    background: transparent;
    color: var(--muted);
    border: 0;
    padding: 5px 8px;
    cursor: pointer;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .toggle-group button.active {
    background: var(--panel-2);
    color: var(--ink);
  }

  .hud {
    position: absolute;
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--muted);
    letter-spacing: 0.04em;
    pointer-events: none;
  }
  .hud.tl { top: 14px; left: 16px; max-width: 48%; }
  .hud.tr { top: 14px; right: 16px; text-align: right; max-width: 45%; }
  .hud.bl { bottom: 14px; left: 16px; max-width: 60%; }
  .hud.br { bottom: 14px; right: 16px; text-align: right; max-width: 60%; }
  .hud .big {
    font-family: var(--font-math);
    font-style: italic;
    font-size: 16px;
    color: var(--ink);
    display: block;
    margin-bottom: 2px;
  }
  .hud .hot { color: var(--hot); }

  .btn {
    font-family: var(--font-mono);
    font-size: 11px;
    background: var(--panel);
    border: 1px solid var(--line);
    color: var(--ink-soft);
    padding: 6px 10px;
    border-radius: 4px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .btn:hover { border-color: var(--hot); color: var(--hot); }
  .btn.primary { background: var(--hot); color: #17140b; border-color: var(--hot); }

  .defbox {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 12px 14px;
    font-family: var(--font-mono);
    font-size: 12.5px;
    line-height: 1.55;
    color: var(--ink-soft);
  }
  .defbox .math {
    font-family: var(--font-math);
    font-style: italic;
    font-size: 15px;
    color: var(--ink);
  }
  .defbox .label {
    display: block;
    font-family: var(--font-mono);
    font-size: 9.5px;
    color: var(--muted-2);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 6px;
  }

  .module-header {
    display: flex; align-items: baseline; gap: 10px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--line-soft);
  }

  /* variable styling in inline math-ish labels */
  .var { font-family: var(--font-math); font-style: italic; font-size: 1.08em; }

  .legend {
    display: flex; gap: 14px; align-items: center;
    font-family: var(--font-mono); font-size: 10.5px; color: var(--muted);
  }
  .legend .sw { width: 14px; height: 2px; display: inline-block; margin-right: 5px; vertical-align: middle; }

  .nodrag { -webkit-user-select: none; user-select: none; }

  /* loading shim */
  #loading {
    position: fixed; inset: 0; display: grid; place-items: center;
    background: var(--bg); color: var(--muted); font-family: var(--font-mono); font-size: 12px;
    z-index: 100;
  }
</style>
</head>
<body>
<div id="loading">chargement · analyse vectorielle</div>
<div id="root"></div>
